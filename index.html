<!DOCTYPE html>
<html>
<head>
  <title>E-3BPM TROPA</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

</head>

<body style="background:black;color:white;text-align:center;margin-top:50px;">

<h1>E-3BPM TROPA</h1>
<p>Portal oficial do batalhão</p>

<button id="btnInstall" style="display:none;padding:15px;font-size:18px;">
INSTALAR AGORA
</button>

<script>
let deferredPrompt;

// ✅ REGISTRO CORRETO DO SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
  .then(() => console.log("SW registrado"))
  .catch(err => console.log("Erro SW:", err));
}

// ✅ DETECTA SE ESTÁ INSTALADO (ANDROID)
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true; // iPhone
}

// ✅ SE JÁ ESTÁ INSTALADO → REDIRECIONA
if (isStandalone()) {
  window.location.replace("https://sites.google.com/view/e-3bpmtropa/início");
}

// ✅ CAPTURA EVENTO DE INSTALAÇÃO
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("btnInstall").style.display = "block";
});

// ✅ BOTÃO INSTALAR
document.getElementById("btnInstall").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === 'accepted') {
      console.log("Instalado com sucesso");
    }

    deferredPrompt = null;
  }
});
</script>

</body>
</html>
