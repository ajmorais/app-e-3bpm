<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-3BPM TROPA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: black; color: white; text-align: center; margin-top: 50px; font-family: sans-serif; }
        #btnInstall { 
            display: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            background-color: #0044cc; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>E-3BPM TROPA</h1>
    <p>Portal oficial do batalhão</p>
    
    <button id="btnInstall">INSTALAR AGORA</button>

    <script>
        // URL de destino final
        const urlDestino = "https://sites.google.com/view/e-3bpmtropa/in%C3%ADcio?pli=1";

        // 1. VERIFICAÇÃO DE INSTALAÇÃO: Se já estiver instalado, vai direto para o site
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            window.location.href = urlDestino;
        }

        // 2. REGISTRO DO SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        // 3. LÓGICA DE INSTALAÇÃO
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block'; // Mostra o botão apenas se for instalável
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Usuário aceitou a instalação');
                    btnInstall.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Caso o usuário instale, redireciona após a conclusão
        window.addEventListener('appinstalled', () => {
            window.location.href = urlDestino;
        });
    </script>
</body>
</html>
