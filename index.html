<!DOCTYPE html>
<html>
<head>
  <title>E-3BPM TROPA</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

</head>

<body style="background:black;color:white;text-align:center;margin-top:50px;">

<h1>E-3BPM TROPA</h1>
<p>Portal oficial do batalhão</p>

<button id="btnInstall" style="display:none;padding:15px;font-size:18px;">
INSTALAR AGORA
</button>

<script>
let deferredPrompt;

// REGISTRA SERVICE WORKER (ESSENCIAL)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// Detecta modo app
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches;
}

// Se já estiver instalado → abre o site
if (isStandalone()) {
  window.location.href = "https://sites.google.com/view/e-3bpmtropa/início";
}

// Evento de instalação
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstall").style.display = "block";
});

// Clique no botão
document.getElementById("btnInstall").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});
</script>

</body>
</html>
